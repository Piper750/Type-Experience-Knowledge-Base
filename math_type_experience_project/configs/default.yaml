paths:
  dataset_root: ../math_datasets
  output_root: ./outputs

llm:
  backend: mock
  model_name: gpt-4o-mini
  api_base: ""
  api_key_env: OPENAI_API_KEY
  temperature: 0.2

kb:
  min_validation_score: 0.55
  use_validation: true
  use_advanced_generation: true

retrieval:
  top_k: 4
  alpha_type: 0.45
  alpha_question: 0.35
  alpha_experience: 0.10
  alpha_quality: 0.10
  use_quality: true
  refine: true

evaluation:
  modes:
    - zero_shot
    - type_only
    - experience_only
    - full
  max_eval_samples: 100
